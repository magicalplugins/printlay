name: Deploy to Fly.io

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: fly-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: fly deploy
    runs-on: ubuntu-latest
    # Skip the job entirely if the FLY_API_TOKEN secret isn't configured,
    # so the workflow doesn't red-X every push during initial setup. Add the
    # secret in Settings -> Secrets and variables -> Actions to enable.
    if: ${{ vars.ENABLE_FLY_DEPLOY == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy --remote-only --wait-timeout 300
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
