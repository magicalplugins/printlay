app = "printlay"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

[deploy]
  release_command = "alembic upgrade head"

[env]
  ENVIRONMENT = "production"

# Expanded service config (equivalent to [http_service]) so we can use a TCP
# health check instead of HTTP. Heavy sticker/image jobs are CPU-bound and can
# peg the (shared) CPU for several seconds; an HTTP GET /api/health check then
# times out, Fly marks the instance unhealthy, and the proxy drops ALL traffic
# ("no healthy instances" → Cloudflare 524). A TCP check only verifies the port
# is listening (the kernel completes the handshake even while Python is busy),
# so the machine stays in rotation through CPU spikes — requests get slow under
# load instead of the entire site going down.
[[services]]
  internal_port = 8000
  protocol = "tcp"
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  max_machines_running = 5

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "requests"
    soft_limit = 25
    hard_limit = 50

  [[services.tcp_checks]]
    grace_period = "30s"
    interval = "15s"
    timeout = "10s"

[[vm]]
  size = "shared-cpu-2x"
  memory = "2gb"
