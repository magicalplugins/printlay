app = "printlay"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

[deploy]
  release_command = "alembic upgrade head"

[env]
  ENVIRONMENT = "production"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  max_machines_running = 5

  [http_service.concurrency]
    type = "requests"
    soft_limit = 25
    hard_limit = 50

# Tolerant health check: heavy sticker/image jobs can briefly peg the CPU.
# A short timeout used to flap the check and make the Fly proxy drop ALL
# traffic ("no healthy instances" → Cloudflare 524). Longer timeout + grace
# keeps the machine in rotation through CPU spikes instead of going dark.
[[http_service.checks]]
  grace_period = "30s"
  interval = "15s"
  method = "GET"
  timeout = "15s"
  path = "/api/health"

[[vm]]
  size = "shared-cpu-2x"
  memory = "2gb"
